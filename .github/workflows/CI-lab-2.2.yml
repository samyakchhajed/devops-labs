name: CI - Lab 2.2 Multi-Job Pipeline with Docker Build and Push

on:
  push:
    branches:
      - '**'
    paths:
      - '2-ci_cd/02-multi-job-docker-build-push/**'
  pull_request:
    branches:
      - '**'
    paths:
      - '2-ci_cd/02-multi-job-docker-build-push/**'

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 2-ci_cd/02-multi-job-docker-build-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          echo "Running tests..."
          pytest test_app.py -v
          echo "Success! All tests passed"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: 2-ci_cd/02-multi-job-docker-build-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./2-ci_cd/02-multi-job-docker-build-push
          push: true
          tags: ghcr.io/samyakchhajed/myapp:${{ github.sha }}

      - name: Deploy to production
        run: echo "Deploying to production"
